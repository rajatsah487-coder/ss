<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Shikha Bhabhi | The Eternal Celebration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Playfair+Display:ital,wght@1,600;1,900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Syncopate', sans-serif; cursor: crosshair; }

        canvas { display: block; position: absolute; top: 0; left: 0; }

        #interface {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
            color: white;
            text-align: center;
        }

        .bhabhi-title {
            font-size: clamp(4rem, 10vw, 12rem);
            letter-spacing: 20px;
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 215, 0, 0.5);
            text-transform: uppercase;
            animation: floatText 6s ease-in-out infinite;
            margin-bottom: 20px;
        }

        .wish-box {
            opacity: 0;
            transform: translateY(40px);
            transition: all 2.5s cubic-bezier(0.19, 1, 0.22, 1);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            padding: 40px 50px;
            border-radius: 10px;
            border-left: 4px solid #D4AF37;
            border-right: 4px solid #D4AF37;
            max-width: 800px;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.1);
        }

        .wish-box.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.8rem; 
            color: #D4AF37; 
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .poetry-text { 
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.4rem; 
            color: #e0e0e0; 
            line-height: 2;
            margin-bottom: 20px;
        }

        .highlight {
            color: #D4AF37;
            font-weight: 900;
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        .footer-info {
            position: absolute;
            bottom: 30px;
            font-size: 11px;
            letter-spacing: 6px;
            color: rgba(212, 175, 55, 0.5);
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="world"></canvas>

    <div id="interface">
        <h1 class="bhabhi-title">SHIKHA</h1>
        
        <div class="wish-box" id="message">
            <h2>Happy Birthday, Bhabhi! ✨</h2>
            <div class="poetry-text">
                Aapki muskurahat se roshan hai yeh aangan,<br>
                Khushiyon se bhara rahe aapka har ek pal aur jeevan.<br><br>
                To the most elegant and amazing person, may the universe <br>
                always align to bring you infinite joy and peace.<br>
                <span class="highlight">Have a magical day!</span>
            </div>
        </div>

        <div class="footer-info">MOVE CURSOR TO REVEAL THE MAGIC</div>
    </div>

    <script>
        const canvas = document.getElementById('world');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const mouse = { x: -100, y: -100 };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
            // Reveal the poetic message when she moves the mouse
            document.getElementById('message').classList.add('visible');
            document.querySelector('.footer-info').style.opacity = '0';
        });

        // Touch support for phones
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            document.getElementById('message').classList.add('visible');
            document.querySelector('.footer-info').style.opacity = '0';
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.angle = Math.random() * Math.PI * 2;
                this.velocity = Math.random() * 0.015;
                this.distance = Math.random() * 250 + 100;
                this.color = Math.random() > 0.6 ? '#D4AF37' : '#ffffff';
            }

            update() {
                this.angle += this.velocity;
                let orbitX = Math.cos(this.angle) * this.distance;
                let orbitY = Math.sin(this.angle) * this.distance;

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 180) {
                    this.x -= dx / 6;
                    this.y -= dy / 6;
                } else {
                    this.x += ( (canvas.width/2 + orbitX) - this.x) * 0.04;
                    this.y += ( (canvas.height/2 + orbitY) - this.y) * 0.04;
                }
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 450; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            for (let i = 0; i < particles.length; i++) {
                for (let j = i; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);

                    if (dist < 85) {
                        ctx.strokeStyle = `rgba(212, 175, 55, ${1 - dist/85 * 0.25})`;
                        ctx.lineWidth = 0.6;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>
