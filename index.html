<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIKHA: THE COSMIC ORIGIN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Syncopate', sans-serif;
        }

        canvas {
            display: block;
            filter: blur(1px) contrast(1.2);
        }

        #ui-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .main-title {
            font-size: clamp(2rem, 15vw, 10rem);
            color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.4);
            letter-spacing: 20px;
            text-transform: uppercase;
            transition: 0.5s;
        }

        .main-title:hover {
            -webkit-text-stroke: 1px #fff;
            filter: drop-shadow(0 0 30px #fff);
        }

        .data-stream {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: #444;
            font-size: 10px;
            letter-spacing: 2px;
            line-height: 2;
        }

        /* Ambient Glow */
        .glow-sphere {
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(100,0,255,0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1 class="main-title">SHIKHA</h1>
        <div class="data-stream">
            SYSTEM_STATUS: CELEBRATING_LIFE<br>
            COORDINATES: INFINITE_JOY<br>
            VERSION: BEYOND_HUMAN_1.0
        </div>
    </div>
    <div class="glow-sphere" id="cursor-glow"></div>
    <canvas id="canvas1"></canvas>

    <script>
        const canvas = document.getElementById('canvas1');
        const ctx = canvas.getContext('2d');
        const glow = document.getElementById('cursor-glow');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        const numberOfParticles = 150;

        const mouse = { x: null, y: null };

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
            glow.style.left = e.x - 300 + 'px';
            glow.style.top = e.y - 300 + 'px';
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 5 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                this.color = 'rgba(255, 255, 255, 0.8)';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Infinite loop wrap around
                if (this.x > canvas.width) this.x = 0;
                else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                else if (this.y < 0) this.y = canvas.height;

                // Interaction with mouse
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 150) {
                    this.x -= dx / 10;
                    this.y -= dy / 10;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; // Ghosting effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connect();
            requestAnimationFrame(animate);
        }

        function connect() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 150) {
                        let opacity = 1 - (distance / 150);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity * 0.3})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];
            init();
        });
    </script>
</body>
</html>
